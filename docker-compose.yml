version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: invoiceapp-db
    environment:
      POSTGRES_DB: invoiceapp
      POSTGRES_USER: invoiceapp
      POSTGRES_PASSWORD: invoiceapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoiceapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: invoiceapp-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/invoiceapp
      DB_USERNAME: invoiceapp
      DB_PASSWORD: invoiceapp
      JWT_SECRET: change-this-to-a-secure-256-bit-secret-key-in-production
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
